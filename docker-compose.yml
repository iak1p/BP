services:
  postgres:
    image: postgres:16
    container_name: local-BP-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5555:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  react:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: bp-ui
    environment:
      VITE_API_URL: http://localhost:4001
    ports:
      - "5173:5173"
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./ui:/app
      - /app/node_modules
volumes:
  pgdata:
